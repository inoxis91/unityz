<div class="calendar-container">
  <div class="calendar-header">
    <h1>Calendrier de Guilde</h1>
    <p class="subtitle">Planifiez et participez aux activités de Unity'Z</p>
  </div>
  
  <div class="calendar-card">
    <full-calendar [options]="calendarOptions()"></full-calendar>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" 
       *ngIf="contextMenu()" 
       [style.left.px]="contextMenu()!.x" 
       [style.top.px]="contextMenu()!.y"
       (click)="$event.stopPropagation()">
    <ng-container *ngIf="contextMenu()!.type === 'event'">
      <button (click)="onEditEvent(contextMenu()!.data)">
        <span>📝</span> Modifier l'événement
      </button>
      <button (click)="onCopyEvent(contextMenu()!.data)">
        <span>📋</span> Copier l'événement
      </button>
      <button class="delete" (click)="onDeleteEvent(contextMenu()!.data)">
        <span>🗑️</span> Supprimer l'événement
      </button>
    </ng-container>
    <ng-container *ngIf="contextMenu()!.type === 'cell'">
      <button (click)="onCreateEventFromCell(contextMenu()!.data)">
        <span>➕</span> Créer un événement
      </button>
      <button *ngIf="copiedEvent()" (click)="onPasteEvent(contextMenu()!.data)">
        <span>📥</span> Coller l'événement
      </button>
    </ng-container>
  </div>

  <!-- Create/Edit Event Modal (Admin Only) -->
  <div class="modal-overlay" *ngIf="showModal() && canManageEvents()" (click)="closeModal()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <div class="header-title">
          <span class="icon">📅</span>
          <h2>{{ isEditing() ? 'Modifier' : 'Nouvel' }} Événement</h2>
        </div>
        <button class="close-btn" (click)="closeModal()">&times;</button>
      </div>
      
      <form (ngSubmit)="onSubmitEvent()" class="modern-form">
        <div class="modal-body">
          <div class="form-section">
            <label>Titre de l'activité</label>
            <input type="text" [(ngModel)]="eventForm.title" name="title" required placeholder="Ex: Raid HM Flèche du vide">
          </div>
          
          <div class="form-section">
            <label>Description (Optionnel)</label>
            <textarea [(ngModel)]="eventForm.description" name="description" rows="3" placeholder="Objectifs, prérequis, vocal..."></textarea>
          </div>

          <div class="form-grid">
            <div class="form-section">
              <label>Type</label>
              <select [(ngModel)]="eventForm.type" name="type" class="custom-select">
                <option value="raid">Raid</option>
                <option value="mm+">Donjon MM+</option>
                <option value="custom">Autre / Spécial</option>
              </select>
            </div>
            <div class="form-section">
              <label>Roster autorisé</label>
              <select [(ngModel)]="eventForm.roster_id" name="roster_id" class="custom-select">
                <option value="">Tous les membres</option>
                @for (roster of rosterService.rosters(); track roster.id) {
                  <option [value]="roster.id">{{ roster.name }}</option>
                }
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-section">
              <label>Heure de début</label>
              <input type="time" [(ngModel)]="eventForm.start_time" name="start_time" required>
            </div>
            <div class="form-section">
              <label>Heure de fin</label>
              <input type="time" [(ngModel)]="eventForm.end_time" name="end_time" required>
            </div>
          </div>

          <div class="form-section animated-fade-in" *ngIf="eventForm.type === 'custom'">
            <label>Précisez le type d'événement</label>
            <input type="text" [(ngModel)]="eventForm.customType" name="customType" required placeholder="Ex: Farm Montures">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" (click)="closeModal()">Annuler</button>
          <button type="submit" class="btn-primary">{{ isEditing() ? 'Enregistrer' : 'Créer' }}</button>
        </div>
      </form>
    </div>
  </div>
</div>

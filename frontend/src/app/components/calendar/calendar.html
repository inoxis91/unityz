<div class="calendar-container">
  <div class="calendar-header">
    <h1>Calendrier de Guilde</h1>
    <p class="subtitle">Planifiez et participez aux activités de Unity'Z</p>
  </div>
  
  <div class="calendar-card">
    <full-calendar [options]="calendarOptions()"></full-calendar>
  </div>

  <!-- Create Event Modal (Admin Only) -->
  <div class="modal-overlay" *ngIf="showCreateModal() && isAdmin()" (click)="closeCreateModal()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <div class="header-title">
          <span class="icon">📅</span>
          <h2>Nouvel Événement</h2>
        </div>
        <button class="close-btn" (click)="closeCreateModal()">&times;</button>
      </div>
      
      <form (ngSubmit)="onCreateEvent()" class="modern-form">
        <div class="modal-body">
          <div class="form-section">
            <label>Titre de l'activité</label>
            <input type="text" [(ngModel)]="newEvent.title" name="title" required placeholder="Ex: Raid HM Flèche du vide">
          </div>
          
          <div class="form-section">
            <label>Description (Optionnel)</label>
            <textarea [(ngModel)]="newEvent.description" name="description" rows="3" placeholder="Objectifs, prérequis, vocal..."></textarea>
          </div>

          <div class="form-grid">
            <div class="form-section">
              <label>Type</label>
              <select [(ngModel)]="newEvent.type" name="type" class="custom-select">
                <option value="raid">Raid</option>
                <option value="mm+">Donjon MM+</option>
                <option value="custom">Autre / Spécial</option>
              </select>
            </div>
            <div class="form-section">
              <label>Roster autorisé</label>
              <select [(ngModel)]="newEvent.roster_id" name="roster_id" class="custom-select">
                <option value="">Tous les membres</option>
                @for (roster of rosterService.rosters(); track roster.id) {
                  <option [value]="roster.id">{{ roster.name }} (Poids: {{ roster.weight }})</option>
                }
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-section">
              <label>Heure de début</label>
              <input type="time" [(ngModel)]="newEvent.start_time" name="start_time" required>
            </div>
            <div class="form-section">
              <label>Heure de fin</label>
              <input type="time" [(ngModel)]="newEvent.end_time" name="end_time" required>
            </div>
          </div>

          <div class="form-section animated-fade-in" *ngIf="newEvent.type === 'custom'">
            <label>Précisez le type d'événement</label>
            <input type="text" [(ngModel)]="newEvent.customType" name="customType" required placeholder="Ex: Farm Montures">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" (click)="closeCreateModal()">Annuler</button>
          <button type="submit" class="btn-primary">Créer l'événement</button>
        </div>
      </form>
    </div>
  </div>
</div>

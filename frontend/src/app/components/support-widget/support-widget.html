<div class="support-widget-container">
  <!-- Trigger Button -->
  <button class="support-trigger" (click)="toggleWidget()" [class.active]="isOpen()">
    <span class="trigger-icon">❓</span>
    <span class="trigger-text">{{ i18n.t('support.widget.trigger') }}</span>
  </button>

  <!-- Options Dropdown Menu -->
  @if (isOpen()) {
    <div class="support-dropdown">
      <button class="dropdown-item" (click)="openForm('bug')">
        <span class="item-icon">🐛</span>
        <span class="item-text">{{ i18n.t('support.widget.option.bug') }}</span>
      </button>
      <button class="dropdown-item" (click)="openForm('contact')">
        <span class="item-icon">✉️</span>
        <span class="item-text">{{ i18n.t('support.widget.option.contact') }}</span>
      </button>
    </div>
  }
</div>

<!-- Form Modals -->
<!-- Bug Report Modal -->
@if (activeForm() === 'bug') {
  <div class="support-modal-backdrop" (click)="closeForm()">
    <div class="support-modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ i18n.t('support.bug.title') }}</h2>
        <button class="btn-close" (click)="closeForm()">×</button>
      </div>
      <form (ngSubmit)="submitBug()" #bugForm="ngForm" class="support-form">
        <div class="form-group">
          <label for="bugName">{{ i18n.t('support.bug.name') }}</label>
          <input
            type="text"
            id="bugName"
            [ngModel]="bugName()"
            (ngModelChange)="bugName.set($event)"
            name="bugName"
            required
            placeholder="ex: Thrall"
          />
        </div>
        <div class="form-group">
          <label for="bugEmail">{{ i18n.t('support.bug.email') }}</label>
          <input
            type="email"
            id="bugEmail"
            [ngModel]="bugEmail()"
            (ngModelChange)="bugEmail.set($event)"
            name="bugEmail"
            required
            placeholder="ex: mail@example.com"
          />
        </div>
        <div class="form-row">
          <div class="form-group flex-2">
            <label for="bugSubject">{{ i18n.t('support.bug.subject') }}</label>
            <input
              type="text"
              id="bugSubject"
              [ngModel]="bugSubject()"
              (ngModelChange)="bugSubject.set($event)"
              name="bugSubject"
              required
              [placeholder]="i18n.t('support.placeholder.bug_subject')"
            />
          </div>
          <div class="form-group flex-1">
            <label for="bugSeverity">{{ i18n.t('support.bug.severity') }}</label>
            <select
              id="bugSeverity"
              [ngModel]="bugSeverity()"
              (ngModelChange)="bugSeverity.set($event)"
              name="bugSeverity"
              required
            >
              <option value="low">{{ i18n.t('support.bug.severity.low') }}</option>
              <option value="medium">{{ i18n.t('support.bug.severity.medium') }}</option>
              <option value="high">{{ i18n.t('support.bug.severity.high') }}</option>
              <option value="critical">{{ i18n.t('support.bug.severity.critical') }}</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="bugDesc">{{ i18n.t('support.bug.desc') }}</label>
          <textarea
            id="bugDesc"
            [ngModel]="bugDesc()"
            (ngModelChange)="bugDesc.set($event)"
            name="bugDesc"
            required
            rows="4"
            [placeholder]="i18n.t('support.placeholder.bug_desc')"
          ></textarea>
        </div>
        <div class="form-actions">
          <button
            type="button"
            class="btn-cancel"
            (click)="closeForm()"
            [disabled]="isSubmitting()"
          >
            {{ i18n.t('support.btn.cancel') }}
          </button>
          <button
            type="submit"
            class="btn-submit btn-submit-bug"
            [disabled]="!bugForm.valid || isSubmitting()"
          >
            @if (!isSubmitting()) {
              <span>{{ i18n.t('support.btn.send') }}</span>
            }
            @if (isSubmitting()) {
              <span class="spinner"></span>
            }
          </button>
        </div>
      </form>
    </div>
  </div>
}

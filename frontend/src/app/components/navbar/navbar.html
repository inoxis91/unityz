<nav class="navbar" [class.menu-open]="isMenuOpen()">
  <div class="navbar-container">
    <div class="navbar-brand" routerLink="/dashboard" (click)="closeMenu()">
      Unity'Z
    </div>

    <!-- Burger Menu Button -->
    <button class="burger-btn" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <div class="nav-links" [class.active]="isMenuOpen()">
      @if (authService.currentUser()) {
        <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Dashboard</a>
        <a routerLink="/calendar" routerLinkActive="active" (click)="closeMenu()">Calendrier</a>
        <a routerLink="/fees" routerLinkActive="active" (click)="closeMenu()">Cotisations</a>
        <a routerLink="/options" routerLinkActive="active" (click)="closeMenu()">Options</a>
        <a routerLink="/admin" routerLinkActive="active" *ngIf="authService.canAccessAdmin()" (click)="closeMenu()">Admin</a>
        <button (click)="logout()" class="btn-logout">Déconnexion</button>
      }
    </div>
  </div>
</nav>

<!-- Backdrop for mobile menu -->
<div class="menu-backdrop" *ngIf="isMenuOpen()" (click)="closeMenu()"></div>

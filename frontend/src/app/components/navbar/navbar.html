<nav class="navbar" [class.menu-open]="isMenuOpen()">
  <div class="navbar-container">
    <div class="navbar-brand" routerLink="/" (click)="closeMenu()">
      Guild Manager
    </div>

    <!-- Burger Menu Button -->
    <button class="burger-btn" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <div class="nav-links" [class.active]="isMenuOpen()">
      @if (authService.currentUser(); as user) {
        <a *ngIf="user.has_characters" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Dashboard</a>
        <a *ngIf="user.has_characters" routerLink="/calendar" routerLinkActive="active" (click)="closeMenu()">Calendrier</a>
        <a *ngIf="user.has_characters" routerLink="/fees" routerLinkActive="active" (click)="closeMenu()">Cotisations</a>
        <a routerLink="/options" routerLinkActive="active" (click)="closeMenu()">Options</a>
        <a routerLink="/admin" routerLinkActive="active" *ngIf="user.has_characters && authService.canAccessAdmin()" (click)="closeMenu()">Admin</a>
        <button (click)="logout()" class="btn-logout">Déconnexion</button>
      }
    </div>
  </div>
</nav>

<!-- Backdrop for mobile menu -->
<div class="menu-backdrop" *ngIf="isMenuOpen()" (click)="closeMenu()"></div>

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=unityz_user
      - POSTGRES_PASSWORD=unityz_password
      - POSTGRES_DB=unityz_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: npm run dev
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://unityz_user:unityz_password@db:5432/unityz_db
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    command: npm start
    ports:
      - '4200:4200'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
